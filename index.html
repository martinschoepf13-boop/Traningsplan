<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <!-- mobile-first, verhindert ungewolltes Zoomen beim Eingeben -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A6BB0" />
  <title>Upper Body Trainer</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <!-- iOS Home-Screen -->
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UB Trainer" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 id="header-title">Upper Body Trainer</h1>
    <span id="header-week" class="badge"></span>
  </header>

  <main id="view" class="view"><!-- Inhalt wird per JS gerendert --></main>

  <!-- Pausen-Timer Overlay -->
  <div id="timer-overlay" class="timer-overlay hidden" aria-hidden="true">
    <div class="timer-card">
      <p class="timer-label">Satzpause</p>
      <div id="timer-display" class="timer-display">01:30</div>
      <div class="timer-buttons">
        <button class="btn small" data-timer="-15">−15 s</button>
        <button class="btn small" data-timer="+15">+15 s</button>
      </div>
      <button id="timer-stop" class="btn primary wide">Fertig</button>
    </div>
  </div>

  <!-- untere Tab-Navigation -->
  <nav class="tabbar">
    <button class="tab" data-route="plan"><span>🗓️</span>Plan</button>
    <button class="tab" data-route="workout"><span>🏋️</span>Training</button>
    <button class="tab" data-route="progress"><span>📈</span>Fortschritt</button>
    <button class="tab" data-route="library"><span>📚</span>Übungen</button>
    <button class="tab" data-route="data"><span>⚙️</span>Daten</button>
  </nav>

  <!-- Reihenfolge wichtig: erst Daten/Logik, dann App -->
  <script src="./js/data.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/chart.js"></script>
  <script src="./js/progression.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
